# D-2: deploys the static site to Cloud Run. Inert until the repo has:
#   - repository variable GCP_PROJECT_ID (and optionally GCP_REGION, default europe-north1)
#   - secret GCP_SA_KEY: JSON key of a service account with roles
#     run.admin + artifactregistry.writer + iam.serviceAccountUser
# One-time GCP setup (after creating the project, see BACKLOG D-1/D-2):
#   gcloud artifacts repositories create punditbench --repository-format=docker --location=europe-north1
name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.GCP_PROJECT_ID != ''
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and push image
        run: |
          REGION=${{ vars.GCP_REGION || 'europe-north1' }}
          IMAGE=$REGION-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/punditbench/site:${{ github.sha }}
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - name: Deploy to Cloud Run
        run: |
          REGION=${{ vars.GCP_REGION || 'europe-north1' }}
          gcloud run deploy punditbench \
            --image $IMAGE \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --max-instances 4
